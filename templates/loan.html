<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Loan - Paytm</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; background: #f5f5f5; }
        .header { background: #00b9f5; padding: 12px 16px; padding-top: 55px; color: white; display: flex; align-items: center; gap: 15px; }
        .back-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }
        .logo { font-size: 20px; font-weight: bold; flex: 1; }
        .container { padding: 20px; }
        .loan-card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 16px; cursor: pointer; }
        .loan-amount { font-size: 24px; font-weight: bold; color: #00b9f5; }
        .apply-btn { background: #00b9f5; color: white; border: none; width: 100%; padding: 16px; border-radius: 16px; font-size: 18px; font-weight: 600; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="window.location.href='/'">←</button>
        <div class="logo">Personal Loan</div>
    </div>
    <div class="container">
        <div class="loan-card" onclick="alert('Demo: Loan application started')">
            <div class="loan-amount">Up to ₹10,00,000</div>
            <div style="color: #666; font-size: 12px; margin-top: 5px;">Instant approval • Low interest rates</div>
        </div>
        <div class="loan-card" onclick="alert('Demo: Loan application started')">
            <div class="loan-amount">Paytm Postpaid</div>
            <div style="color: #666; font-size: 12px; margin-top: 5px;">Get up to ₹60,000 credit</div>
        </div>
        <div class="loan-card" onclick="alert('Demo: Loan application started')">
            <div class="loan-amount">Two-Wheeler Loan</div>
            <div style="color: #666; font-size: 12px; margin-top: 5px;">Easy EMI options</div>
        </div>
        <button class="apply-btn" onclick="alert('Demo: Loan application started')">Apply for Loan</button>
    </div>
</body>
</html>
