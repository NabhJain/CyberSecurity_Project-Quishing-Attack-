<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Credit Card - Paytm</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; background: #f5f5f5; }
        .header { background: #00b9f5; padding: 12px 16px; padding-top: 55px; color: white; display: flex; align-items: center; gap: 15px; }
        .back-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }
        .logo { font-size: 20px; font-weight: bold; flex: 1; }
        .container { padding: 20px; }
        .card-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-radius: 16px; padding: 25px; margin-bottom: 20px; }
        .card-number { font-size: 18px; letter-spacing: 2px; margin-bottom: 15px; }
        .card-details { display: flex; justify-content: space-between; margin-top: 20px; }
        .bill-card { background: white; border-radius: 16px; padding: 20px; }
        .pay-btn { background: #00b9f5; color: white; border: none; width: 100%; padding: 16px; border-radius: 16px; font-size: 18px; font-weight: 600; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="window.location.href='/'">←</button>
        <div class="logo">Credit Card</div>
    </div>
    <div class="container">
        <div class="card-card">
            <div class="card-number">•••• 1234 •••• 5678</div>
            <div>VALID THRU 12/28</div>
            <div class="card-details">
                <span>Card Holder</span>
                <span>{{ user.name }}</span>
            </div>
        </div>
        <div class="bill-card">
            <div class="section-header" style="display: flex; justify-content: space-between; margin-bottom: 15px;">
                <span class="section-title" style="font-weight: 600;">Current Bill</span>
                <span style="color: #00b9f5; font-weight: 600;">₹5,000</span>
            </div>
            <div class="section-header" style="display: flex; justify-content: space-between; margin-bottom: 15px;">
                <span class="section-title" style="font-weight: 600;">Due Date</span>
                <span>15th March 2024</span>
            </div>
            <button class="pay-btn" onclick="alert('Demo: This would proceed to payment')">Pay Now</button>
        </div>
    </div>
</body>
</html>
