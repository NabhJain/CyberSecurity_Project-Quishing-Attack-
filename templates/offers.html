<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Offers - Paytm</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; background: #f5f5f5; }
        .header { background: #00b9f5; padding: 12px 16px; padding-top: 55px; color: white; display: flex; align-items: center; gap: 15px; }
        .back-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }
        .logo { font-size: 20px; font-weight: bold; flex: 1; }
        .container { padding: 20px; }
        .offer-card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        .offer-left .offer-title { font-weight: 600; color: #333; margin-bottom: 5px; }
        .offer-left .offer-desc { font-size: 12px; color: #666; }
        .offer-code { background: #f0f8ff; color: #00b9f5; padding: 8px 16px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="window.location.href='/'">←</button>
        <div class="logo">Offers & Cashback</div>
    </div>
    <div class="container">
        {% for offer in offers %}
        <div class="offer-card" onclick="alert('Offer code: {{ offer.code }}')">
            <div class="offer-left">
                <div class="offer-title">{{ offer.title }}</div>
                <div class="offer-desc">{{ offer.desc }}</div>
            </div>
            <div class="offer-code">{{ offer.code }}</div>
        </div>
        {% endfor %}
    </div>
</body>
</html>
