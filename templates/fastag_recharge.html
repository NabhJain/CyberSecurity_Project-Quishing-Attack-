<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FASTag Recharge - Paytm</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; background: #f5f5f5; }
        .header { background: #00b9f5; padding: 12px 16px; padding-top: 55px; color: white; display: flex; align-items: center; gap: 15px; }
        .back-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }
        .logo { font-size: 20px; font-weight: bold; flex: 1; }
        .container { padding: 20px; }
        .input-card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 20px; }
        .input-label { font-size: 14px; color: #666; margin-bottom: 8px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #e0e0e0; border-radius: 12px; font-size: 16px; margin-bottom: 15px; }
        .pay-btn { background: #00b9f5; color: white; border: none; width: 100%; padding: 16px; border-radius: 16px; font-size: 18px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="window.location.href='/'">←</button>
        <div class="logo">FASTag Recharge</div>
    </div>
    <div class="container">
        <div class="input-card">
            <div class="input-label">Vehicle Number</div>
            <input type="text" placeholder="Enter vehicle number" id="vehicle">
            <div class="input-label">Amount</div>
            <input type="number" placeholder="Enter amount" id="amount" value="500">
        </div>
        <button class="pay-btn" onclick="alert('Demo: This would proceed to payment')">Proceed to Pay</button>
    </div>
</body>
</html>
