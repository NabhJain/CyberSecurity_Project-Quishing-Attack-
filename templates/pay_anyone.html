<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pay Anyone - Paytm</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; background: #f5f5f5; }
        .header { background: #00b9f5; padding: 12px 16px; padding-top: 55px; color: white; display: flex; align-items: center; gap: 15px; }
        .back-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }
        .logo { font-size: 20px; font-weight: bold; flex: 1; }
        .container { padding: 20px; }
        .input-card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 20px; }
        .input-label { font-size: 14px; color: #666; margin-bottom: 8px; }
        input { width: 100%; padding: 12px; border: 1px solid #e0e0e0; border-radius: 12px; font-size: 16px; margin-bottom: 15px; }
        .pay-btn { background: #00b9f5; color: white; border: none; width: 100%; padding: 16px; border-radius: 16px; font-size: 18px; font-weight: 600; cursor: pointer; }
        .contact-list { background: white; border-radius: 16px; padding: 16px; margin-top: 20px; }
        .contact-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-bottom: 1px solid #f0f0f0; cursor: pointer; }
        .contact-icon { width: 40px; height: 40px; background: #00b9f5; border-radius: 20px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="window.location.href='/'">←</button>
        <div class="logo">Pay Anyone</div>
    </div>
    <div class="container">
        <div class="input-card">
            <div class="input-label">Mobile Number / UPI ID</div>
            <input type="text" placeholder="Enter mobile number or UPI ID" id="mobile">
            <div class="input-label">Amount</div>
            <input type="number" placeholder="Enter amount" id="amount" value="500">
            <div class="input-label">Note (Optional)</div>
            <input type="text" placeholder="Add a note" id="note">
        </div>
        <button class="pay-btn" onclick="alert('Demo: This would proceed to payment')">Proceed to Pay</button>
        
        <div class="contact-list">
            <div class="input-label" style="margin-bottom: 12px;">Recent Contacts</div>
            <div class="contact-item" onclick="document.getElementById('mobile').value='9876543210'">
                <div class="contact-icon">R</div>
                <div>Rahul Sharma<br><span style="font-size: 10px; color: #999;">rahul@paytm</span></div>
            </div>
            <div class="contact-item" onclick="document.getElementById('mobile').value='9988776655'">
                <div class="contact-icon">P</div>
                <div>Priya Singh<br><span style="font-size: 10px; color: #999;">priya@paytm</span></div>
            </div>
        </div>
    </div>
</body>
</html>
