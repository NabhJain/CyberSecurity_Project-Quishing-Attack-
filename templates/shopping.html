<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Shopping - Paytm</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; background: #f5f5f5; }
        .header { background: #00b9f5; padding: 12px 16px; padding-top: 55px; color: white; display: flex; align-items: center; gap: 15px; }
        .back-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }
        .logo { font-size: 20px; font-weight: bold; flex: 1; }
        .container { padding: 20px; }
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
        .product-card { background: white; border-radius: 16px; padding: 16px; text-align: center; cursor: pointer; }
        .product-icon { font-size: 48px; margin-bottom: 10px; }
        .product-name { font-weight: 600; color: #333; margin-bottom: 5px; }
        .product-price { color: #00b9f5; font-weight: 600; }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="window.location.href='/'">←</button>
        <div class="logo">Shopping</div>
    </div>
    <div class="container">
        <div class="product-grid">
            <div class="product-card" onclick="alert('Demo: Product added to cart')">
                <div class="product-icon">📱</div>
                <div class="product-name">Mobile Phone</div>
                <div class="product-price">₹15,999</div>
            </div>
            <div class="product-card" onclick="alert('Demo: Product added to cart')">
                <div class="product-icon">👕</div>
                <div class="product-name">T-Shirt</div>
                <div class="product-price">₹599</div>
            </div>
            <div class="product-card" onclick="alert('Demo: Product added to cart')">
                <div class="product-icon">👟</div>
                <div class="product-name">Shoes</div>
                <div class="product-price">₹2,499</div>
            </div>
            <div class="product-card" onclick="alert('Demo: Product added to cart')">
                <div class="product-icon">⌚</div>
                <div class="product-name">Smart Watch</div>
                <div class="product-price">₹3,999</div>
            </div>
        </div>
    </div>
</body>
</html>
