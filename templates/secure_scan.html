<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Secure Scan - Paytm</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #000;
            min-height: 100vh;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }

        .header {
            background: #00b9f5;
            padding: 12px 16px;
            padding-top: 55px;
            color: white;
            display: flex;
            align-items: center;
            gap: 15px;
            position: relative;
            z-index: 30;
        }

        .back-btn {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
            flex: 1;
        }

        .security-badge {
            background: rgba(255,255,255,0.2);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        #camera-container {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000;
            z-index: 1;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .scanner-frame {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 280px;
            height: 280px;
            z-index: 15;
        }

        .scanner-line {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00b9f5, #00b9f5, transparent);
            animation: scan 2s linear infinite;
            box-shadow: 0 0 10px #00b9f5;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        .corner {
            position: absolute;
            width: 25px;
            height: 25px;
            border-color: #00b9f5;
            border-style: solid;
        }

        .corner-tl { top: -2px; left: -2px; border-width: 3px 0 0 3px; }
        .corner-tr { top: -2px; right: -2px; border-width: 3px 3px 0 0; }
        .corner-bl { bottom: -2px; left: -2px; border-width: 0 0 3px 3px; }
        .corner-br { bottom: -2px; right: -2px; border-width: 0 3px 3px 0; }

        .scanner-text {
            position: absolute;
            bottom: -40px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 14px;
            color: rgba(255,255,255,0.9);
        }

        .bottom-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.9);
            padding: 20px 20px 40px;
            border-top-left-radius: 25px;
            border-top-right-radius: 25px;
            z-index: 20;
        }

        .control-btn {
            background: #00b9f5;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 35px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
        }

        .control-btn.secondary {
            background: rgba(255,255,255,0.15);
            margin-top: 12px;
        }

        .info-text {
            text-align: center;
            font-size: 13px;
            color: #aaa;
            margin-top: 15px;
        }

        /* Analysis Modal */
        .analysis-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
        }

        .analysis-card {
            background: white;
            border-radius: 24px;
            max-width: 350px;
            width: 100%;
            overflow: hidden;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .analysis-header {
            padding: 20px;
            text-align: center;
        }

        .analysis-header.safe {
            background: linear-gradient(135deg, #4caf50 0%, #45a049 100%);
            color: white;
        }

        .analysis-header.suspicious {
            background: linear-gradient(135deg, #ff9800 0%, #f57c00 100%);
            color: white;
        }

        .analysis-header.critical {
            background: linear-gradient(135deg, #f44336 0%, #d32f2f 100%);
            color: white;
        }

        .analysis-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .analysis-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .analysis-subtitle {
            font-size: 12px;
            opacity: 0.9;
        }

        .analysis-body {
            padding: 20px;
        }

        .warning-list {
            background: #fff3e0;
            border-left: 3px solid #ff9800;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
        }

        .warning-list.critical {
            background: #ffebee;
            border-left-color: #f44336;
        }

        .warning-item {
            font-size: 13px;
            color: #666;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .url-display {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 8px;
            font-size: 11px;
            word-break: break-all;
            margin-bottom: 15px;
            font-family: monospace;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .btn-primary {
            background: #00b9f5;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            flex: 1;
            cursor: pointer;
        }

        .btn-danger {
            background: #f44336;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            flex: 1;
            cursor: pointer;
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #666;
            border: none;
            padding: 12px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            flex: 1;
            cursor: pointer;
        }

        .loading {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            flex-direction: column;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: #00b9f5;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 15px;
            color: white;
        }

        .start-camera-btn {
            position: absolute;
            bottom: 200px;
            left: 50%;
            transform: translateX(-50%);
            background: #00b9f5;
            color: white;
            border: none;
            padding: 18px 50px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 600;
            z-index: 30;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            animation: pulse 2s infinite;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        @keyframes pulse {
            0% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.05); }
            100% { transform: translateX(-50%) scale(1); }
        }

        .hidden {
            display: none;
        }

        .qr-icon {
            width: 24px;
            height: 24px;
        }

        .shield-icon {
            width: 20px;
            height: 20px;
        }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="window.location.href='/'">←</button>
        <div class="logo">Secure Scan</div>
        <div class="security-badge">
            <svg class="shield-icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
            Protected
        </div>
    </div>

    <div id="camera-container" class="hidden">
        <video id="video" autoplay playsinline muted></video>
    </div>

    <div id="scannerFrame" class="scanner-frame hidden">
        <div class="scanner-line"></div>
        <div class="corner corner-tl"></div>
        <div class="corner corner-tr"></div>
        <div class="corner corner-bl"></div>
        <div class="corner corner-br"></div>
        <div class="scanner-text">Align QR code within the scanner</div>
    </div>

    <div id="bottomControls" class="bottom-controls hidden">
        <div class="info-text">
            🔒 Secure Scan will analyze QR codes for security threats
        </div>
    </div>

    <div id="loading" class="loading">
        <div class="spinner"></div>
        <div class="loading-text">Analyzing QR Code...</div>
    </div>

    <button id="startCameraBtn" class="start-camera-btn" onclick="startCamera()">
        <svg class="qr-icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <circle cx="8.5" cy="8.5" r="1.5" fill="white"></circle>
            <polyline points="21 15 16 10 5 21"></polyline>
        </svg>
        Start Secure Scan
    </button>

    <div id="analysisModal" class="analysis-modal">
        <div class="analysis-card" id="analysisCard">
            <!-- Content dynamically filled -->
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

    <script>
        let video = document.getElementById('video');
        let stream = null;
        let scanning = false;
        let animationId = null;

        async function startCamera() {
            document.getElementById('startCameraBtn').style.display = 'none';
            document.getElementById('camera-container').classList.remove('hidden');
            document.getElementById('scannerFrame').classList.remove('hidden');
            document.getElementById('bottomControls').classList.remove('hidden');
            
            try {
                const constraints = {
                    video: { facingMode: { exact: 'environment' } }
                };
                
                stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                video.setAttribute('playsinline', true);
                await video.play();
                
                scanning = true;
                requestAnimationFrame(tick);
                
            } catch (err) {
                console.error("Camera error:", err);
                try {
                    stream = await navigator.mediaDevices.getUserMedia({ video: true });
                    video.srcObject = stream;
                    video.setAttribute('playsinline', true);
                    await video.play();
                    scanning = true;
                    requestAnimationFrame(tick);
                } catch (err2) {
                    alert("Camera access denied. Please enable camera in settings.");
                    window.location.href = '/';
                }
            }
        }

        function tick() {
            if (!scanning) return;
            
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                
                const code = jsQR(imageData.data, canvas.width, canvas.height, {
                    inversionAttempts: "dontInvert",
                });
                
                if (code && code.data) {
                    console.log("QR detected:", code.data);
                    onQRCodeDetected(code.data);
                }
            }
            
            animationId = requestAnimationFrame(tick);
        }

        async function onQRCodeDetected(qrData) {
            if (!scanning) return;
            scanning = false;
            
            if (animationId) cancelAnimationFrame(animationId);
            if (stream) stream.getTracks().forEach(track => track.stop());
            
            // Show loading
            const loading = document.getElementById('loading');
            loading.style.display = 'flex';
            
            // Analyze the QR code
            try {
                const response = await fetch('/analyze-qr', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ qr_url: qrData })
                });
                
                const analysis = await response.json();
                loading.style.display = 'none';
                showAnalysisResult(analysis, qrData);
                
            } catch (error) {
                loading.style.display = 'none';
                alert('Error analyzing QR code. Please try again.');
                window.location.href = '/';
            }
        }

        function showAnalysisResult(analysis, qrData) {
            const modal = document.getElementById('analysisModal');
            const card = document.getElementById('analysisCard');
            
            let headerClass = 'safe';
            let icon = '✅';
            let title = 'Safe QR Code';
            let subtitle = 'This QR code appears legitimate';
            
            if (analysis.risk_level === 'critical') {
                headerClass = 'critical';
                icon = '🔴';
                title = 'CRITICAL THREAT DETECTED!';
                subtitle = 'DO NOT PROCEED - This is a phishing QR code';
            } else if (analysis.risk_level === 'high') {
                headerClass = 'suspicious';
                icon = '⚠️';
                title = 'Suspicious QR Code Detected';
                subtitle = 'This QR code shows signs of phishing';
            }
            
            let warningsHtml = '';
            analysis.warnings.forEach(warning => {
                warningsHtml += `<div class="warning-item">${warning}</div>`;
            });
            
            card.innerHTML = `
                <div class="analysis-header ${headerClass}">
                    <div class="analysis-icon">${icon}</div>
                    <div class="analysis-title">${title}</div>
                    <div class="analysis-subtitle">${subtitle}</div>
                </div>
                <div class="analysis-body">
                    <div class="warning-list ${analysis.risk_level === 'critical' ? 'critical' : ''}">
                        ${warningsHtml}
                    </div>
                    <div class="url-display">
                        <strong>Scanned URL:</strong><br>
                        ${analysis.analyzed_url || qrData}
                    </div>
                    ${analysis.is_suspicious ? `
                        <div class="action-buttons">
                            <button class="btn-danger" onclick="reportPhishing('${qrData.replace(/'/g, "\\'")}')">
                                Report Phishing
                            </button>
                            <button class="btn-secondary" onclick="closeModal()">
                                Close
                            </button>
                        </div>
                    ` : `
                        <div class="action-buttons">
                            <button class="btn-primary" onclick="proceedToPayment()">
                                ✅ Proceed (Verified)
                            </button>
                            <button class="btn-secondary" onclick="closeModal()">
                                Cancel
                            </button>
                        </div>
                    `}
                </div>
            `;
            
            modal.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('analysisModal').style.display = 'none';
            window.location.href = '/';
        }

        function proceedToPayment() {
            document.getElementById('analysisModal').style.display = 'none';
            window.location.href = '/payment-page';
        }

        async function reportPhishing(qrUrl) {
            try {
                await fetch('/report-phishing', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ reported_url: qrUrl })
                });
                alert('Thank you for reporting! This QR code has been flagged for review.');
                window.location.href = '/';
            } catch (error) {
                alert('Error reporting. Please try again.');
            }
        }

        window.addEventListener('beforeunload', () => {
            if (stream) stream.getTracks().forEach(track => track.stop());
            if (animationId) cancelAnimationFrame(animationId);
        });
    </script>
</body>
</html>
