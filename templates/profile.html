<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Profile - Paytm</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; background: #f5f5f5; }
        .header { background: #00b9f5; padding: 12px 16px; padding-top: 55px; color: white; display: flex; align-items: center; gap: 15px; }
        .back-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }
        .logo { font-size: 20px; font-weight: bold; flex: 1; }
        .container { padding: 20px; }
        .profile-card { background: white; border-radius: 16px; padding: 30px; text-align: center; margin-bottom: 20px; }
        .avatar { font-size: 80px; margin-bottom: 15px; }
        .name { font-size: 24px; font-weight: 600; color: #333; }
        .info-card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 16px; }
        .info-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
        .info-label { color: #666; }
        .info-value { color: #333; font-weight: 500; }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="window.location.href='/'">←</button>
        <div class="logo">Profile</div>
    </div>
    <div class="container">
        <div class="profile-card">
            <div class="avatar">👤</div>
            <div class="name">{{ user.name }}</div>
            <div style="color: #666; margin-top: 5px;">{{ user.upi_id }}</div>
        </div>
        <div class="info-card">
            <div class="info-row">
                <span class="info-label">Mobile Number</span>
                <span class="info-value">{{ user.phone }}</span>
            </div>
            <div class="info-row">
                <span class="info-label">Email</span>
                <span class="info-value">{{ user.email }}</span>
            </div>
            <div class="info-row">
                <span class="info-label">Account Number</span>
                <span class="info-value">{{ user.account_number }}</span>
            </div>
        </div>
    </div>
</body>
</html>
