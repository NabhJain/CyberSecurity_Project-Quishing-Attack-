<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Payment Successful - Paytm</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; background: #00b9f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .container { max-width: 400px; width: 100%; animation: slideUp 0.5s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .success-card { background: white; border-radius: 24px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .success-header { background: linear-gradient(135deg, #4caf50 0%, #45a049 100%); padding: 40px; text-align: center; color: white; }
        .checkmark { width: 70px; height: 70px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; animation: pop 0.3s ease-out 0.2s both; }
        @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }
        .checkmark span { color: #4caf50; font-size: 40px; font-weight: bold; }
        .amount-paid { font-size: 48px; font-weight: bold; margin: 10px 0; }
        .success-details { padding: 30px; }
        .detail-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
        .detail-label { color: #666; font-size: 14px; }
        .detail-value { font-weight: 500; color: #333; text-align: right; }
        .transaction-id { background: #f8f9fa; padding: 12px; border-radius: 12px; margin-top: 20px; text-align: center; font-size: 11px; color: #666; }
        .done-btn { background: #00b9f5; color: white; border: none; width: 100%; padding: 16px; border-radius: 16px; font-size: 16px; font-weight: 600; margin-top: 20px; cursor: pointer; }
        .warning-badge { background: #fff3cd; border: 1px solid #ffc107; border-radius: 12px; padding: 15px; margin-top: 20px; }
        .warning-badge h4 { color: #856404; margin-bottom: 8px; font-size: 13px; }
        .warning-badge p { color: #856404; font-size: 11px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-card">
            <div class="success-header">
                <div class="checkmark"><span>✓</span></div>
                <div style="font-size: 18px;">Payment Successful</div>
                <div class="amount-paid">₹{{ amount }}</div>
            </div>

            <div class="success-details">
                <div class="detail-row">
                    <span class="detail-label">To</span>
                    <span class="detail-value">{{ merchant.name }}<br><span style="font-size: 10px;">{{ merchant.bank }} - {{ merchant.account }}</span></span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">From</span>
                    <span class="detail-value">{{ user.name }}<br><span style="font-size: 10px;">{{ user.upi_id }}</span></span>
                </div>
                
                <div class="transaction-id">
                    UPI Ref. No: {{ transaction_ref }}<br>
                    {{ time }}
                </div>
                <button class="done-btn" onclick="window.location.href='/'">Done</button>
            </div>
        </div>
    </div>
</body>
</html>
