<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Paytm - Pay</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; background: #f5f5f5; }
        .header { background: #00b9f5; padding: 12px 16px; padding-top: 55px; color: white; display: flex; align-items: center; gap: 15px; }
        .back-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }
        .logo { font-size: 20px; font-weight: bold; flex: 1; }
        .container { padding: 16px; }
        .merchant-card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 20px; display: flex; align-items: center; gap: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .merchant-icon { width: 55px; height: 55px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 28px; }
        .merchant-info { flex: 1; }
        .merchant-name { font-size: 18px; font-weight: 600; color: #333; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .verified-badge { background: #e8f5e9; color: #4caf50; font-size: 10px; padding: 2px 8px; border-radius: 12px; }
        .merchant-bank { font-size: 12px; color: #666; margin-top: 4px; }
        .amount-card { background: white; border-radius: 16px; padding: 24px; margin-bottom: 20px; text-align: center; }
        .amount-label { font-size: 14px; color: #666; margin-bottom: 12px; }
        .amount-input-wrapper { display: flex; align-items: baseline; justify-content: center; border-bottom: 2px solid #00b9f5; display: inline-flex; padding: 0 10px; }
        .currency { font-size: 36px; font-weight: bold; color: #333; }
        #amount { font-size: 48px; font-weight: bold; border: none; outline: none; text-align: center; width: 180px; padding: 5px; font-family: monospace; }
        .suggested-amounts { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
        .suggest-btn { background: #f0f0f0; border: none; padding: 12px; border-radius: 30px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .suggest-btn:active { transform: scale(0.95); }
        .note-card { background: white; border-radius: 16px; padding: 16px; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; }
        .note-card input { border: none; outline: none; flex: 1; font-size: 14px; }
        .note-card input::placeholder { color: #ccc; }
        .pay-btn { background: #00b9f5; color: white; border: none; width: 100%; padding: 16px; border-radius: 16px; font-size: 18px; font-weight: 600; cursor: pointer; }
        .pay-btn:active { transform: scale(0.98); }
        .pay-btn:disabled { background: #ccc; }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="window.location.href='/'">←</button>
        <div class="logo">Paytm</div>
        <div style="width: 24px;"></div>
    </div>

    <div class="container">
        <div class="merchant-card">
            <div class="merchant-icon">🛍️</div>
            <div class="merchant-info">
                <div class="merchant-name">
                    {{ merchant.name }}
                    <span class="verified-badge">✓ Verified</span>
                </div>
                <div class="merchant-bank">{{ merchant.bank }} - {{ merchant.account }}</div>
                <div class="merchant-bank" style="font-size: 11px;">UPI: {{ merchant.upi_id }}</div>
            </div>
        </div>

        <div class="amount-card">
            <div class="amount-label">Enter amount</div>
            <div class="amount-input-wrapper">
                <span class="currency">₹</span>
                <input type="number" id="amount" placeholder="0" value="500">
            </div>
        </div>

        <div class="suggested-amounts">
            <button class="suggest-btn" onclick="setAmount(100)">₹100</button>
            <button class="suggest-btn" onclick="setAmount(200)">₹200</button>
            <button class="suggest-btn" onclick="setAmount(500)">₹500</button>
            <button class="suggest-btn" onclick="setAmount(1000)">₹1000</button>
        </div>

        <div class="note-card">
            <span>📝</span>
            <input type="text" id="note" placeholder="Add a note (optional)">
        </div>

        <button class="pay-btn" onclick="proceedToPay()" id="payBtn">Pay ₹500</button>
    </div>

    <script>
        const amountInput = document.getElementById('amount');
        const payBtn = document.getElementById('payBtn');

        function updatePayButton() {
            const amount = amountInput.value;
            if (amount && amount > 0) {
                payBtn.innerHTML = `Pay ₹${parseInt(amount).toLocaleString()}`;
                payBtn.disabled = false;
            } else {
                payBtn.innerHTML = 'Enter amount';
                payBtn.disabled = true;
            }
        }

        amountInput.addEventListener('input', updatePayButton);
        updatePayButton();

        function setAmount(amount) {
            amountInput.value = amount;
            updatePayButton();
        }

        function proceedToPay() {
            const amount = amountInput.value;
            if (!amount || amount <= 0) {
                alert('Please enter a valid amount');
                return;
            }

            const form = document.createElement('form');
            form.method = 'POST';
            form.action = '/process-payment';
            
            const amountField = document.createElement('input');
            amountField.type = 'hidden';
            amountField.name = 'amount';
            amountField.value = amount;
            
            const noteField = document.createElement('input');
            noteField.type = 'hidden';
            noteField.name = 'note';
            noteField.value = document.getElementById('note').value;
            
            form.appendChild(amountField);
            form.appendChild(noteField);
            document.body.appendChild(form);
            form.submit();
        }
    </script>
</body>
</html>
